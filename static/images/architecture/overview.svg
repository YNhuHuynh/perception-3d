<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Inter, system-ui, sans-serif" role="img" aria-label="PGR-3D architecture overview">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <linearGradient id="frozen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="percep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>

  <!-- Input -->
  <rect x="24" y="210" width="120" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="84" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Single Image</text>
  <circle cx="84" cy="258" r="24" fill="#fbbf24" stroke="#b45309" stroke-width="2"/>
  <rect x="60" y="286" width="48" height="30" rx="4" fill="#94a3b8"/>
  <text x="84" y="352" text-anchor="middle" font-size="11" fill="#64748b">input view</text>

  <!-- Frozen diffusion backbone -->
  <rect x="200" y="150" width="230" height="240" rx="14" fill="url(#frozen)" stroke="#60a5fa" stroke-width="2"/>
  <text x="315" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Frozen Multi-View Diffusion U-Net</text>
  <text x="315" y="176" text-anchor="middle" font-size="12" fill="#1d4ed8">Wonder3D / Era3D &#8226; weights frozen &#10052;</text>
  <!-- decoder blocks -->
  <rect x="222" y="196" width="186" height="34" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="315" y="218" text-anchor="middle" font-size="12" fill="#334155">up_block[1] &#183; 1280c &#183; 16&#215;16</text>
  <rect x="222" y="238" width="186" height="34" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="315" y="260" text-anchor="middle" font-size="12" fill="#334155">up_block[2] &#183; 640c &#183; 32&#215;32</text>
  <rect x="222" y="280" width="186" height="34" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="315" y="302" text-anchor="middle" font-size="12" fill="#334155">up_block[3] &#183; 320c &#183; 32&#215;32</text>
  <text x="315" y="344" text-anchor="middle" font-size="11" fill="#1d4ed8">3 forward hooks (gradients pass through)</text>
  <text x="315" y="366" text-anchor="middle" font-size="11" fill="#64748b">RGB stream + Normal stream</text>

  <!-- Aggregation Network -->
  <rect x="490" y="200" width="150" height="140" rx="12" fill="url(#percep)" stroke="#4ade80" stroke-width="2"/>
  <text x="565" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Aggregation</text>
  <text x="565" y="248" text-anchor="middle" font-size="12" fill="#15803d">multi-scale</text>
  <text x="565" y="266" text-anchor="middle" font-size="12" fill="#15803d">bottleneck</text>
  <text x="565" y="284" text-anchor="middle" font-size="12" fill="#15803d">&#8594; 384-d map</text>
  <text x="565" y="322" text-anchor="middle" font-size="11" fill="#166534">trainable</text>

  <!-- Semantic head -->
  <rect x="700" y="150" width="180" height="70" rx="10" fill="#fff" stroke="#a78bfa" stroke-width="2"/>
  <text x="790" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">Semantic Head</text>
  <text x="790" y="200" text-anchor="middle" font-size="11" fill="#7c3aed">predicts CLIP embedding</text>

  <!-- Depth head -->
  <rect x="700" y="320" width="180" height="70" rx="10" fill="#fff" stroke="#fb923c" stroke-width="2"/>
  <text x="790" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">Depth Head</text>
  <text x="790" y="370" text-anchor="middle" font-size="11" fill="#ea580c">predicts DA-V2 depth</text>

  <!-- Targets -->
  <rect x="940" y="150" width="215" height="70" rx="10" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="1047" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">Target: VLM + CLIP</text>
  <text x="1047" y="200" text-anchor="middle" font-size="11" fill="#7c3aed">semantic identity of object</text>

  <rect x="940" y="320" width="215" height="70" rx="10" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1047" y="348" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">Target: Depth-Anything V2</text>
  <text x="1047" y="370" text-anchor="middle" font-size="11" fill="#ea580c">geometric structure</text>

  <!-- Forward arrows -->
  <line x1="146" y1="270" x2="196" y2="270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="432" y1="270" x2="486" y2="270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="642" y1="250" x2="696" y2="192" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="642" y1="290" x2="696" y2="352" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="882" y1="185" x2="936" y2="185" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <line x1="882" y1="355" x2="936" y2="355" stroke="#fb923c" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- Perception loss labels -->
  <text x="909" y="140" text-anchor="middle" font-size="11" fill="#6d28d9">cosine loss</text>
  <text x="909" y="412" text-anchor="middle" font-size="11" fill="#c2410c">scale-inv. L1</text>

  <!-- Guidance feedback arrow (bottom) -->
  <path d="M 790 392 L 790 470 L 315 470 L 315 394" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowGreen)"/>
  <rect x="470" y="452" width="220" height="34" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="580" y="474" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">&#8711; perception loss &#8594; guide latents x&#8348;</text>
</svg>
